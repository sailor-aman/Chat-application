services:
  - type: web
    name: chat-app-server
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://YOUR_VERCEL_FRONTEND_URL
      - key: MONGODB_URI
        sync: false
